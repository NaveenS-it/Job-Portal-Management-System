<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Jobs - Admin</title>
    <link rel="stylesheet" href="/css/style.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="container mt-5 mb-5">
        <div class="flex justify-between items-center mb-4">
            <h2>Global Jobs Audit</h2>
            <a href="/admin/dashboard" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Return</a>
        </div>

        <div class="card" style="padding: 0;">
            <div class="table-responsive" style="border: none; box-shadow: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Job Profile</th>
                            <th>Employer Account</th>
                            <th>Category & Setup</th>
                            <th>Metrics</th>
                            <th>Control</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="job : ${jobs}">
                            <td>
                                <strong style="font-size: 1.05rem;" th:text="${job.title}">Title</strong>
                                <div class="text-muted text-sm mt-1" th:text="${job.location}">Location</div>
                            </td>
                            <td>
                                <div><i class="fas fa-building text-muted text-sm"></i> <span th:text="${job.postedBy.companyName != null ? job.postedBy.companyName : job.postedBy.name}">Employer</span></div>
                                <div class="text-muted text-sm mt-1" th:text="${job.postedBy.email}">Email</div>
                            </td>
                            <td>
                                <span class="badge badge-outline"><i class="fas fa-layer-group text-primary"></i> <span th:text="${job.category}">Cat</span></span>
                                <span class="badge badge-outline"><i class="fas fa-laptop text-secondary"></i> <span th:text="${job.workMode}">Mode</span></span>
                            </td>
                            <td class="text-muted">
                                <i class="fas fa-users-cog"></i> <span th:text="${job.applications.size()}">0</span> Submissions
                            </td>
                            <td>
                                <form th:action="@{'/admin/job/' + ${job.id} + '/delete'}" method="post" onsubmit="return confirm('ADMIN WARNING: Force delete this active job?');">
                                    <button type="submit" class="btn btn-outline" style="color: var(--accent); border-color: transparent;"><i class="fas fa-ban"></i> Terminate</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(jobs)}">
                            <td colspan="5" class="text-center" style="padding: 60px;">
                                <i class="far fa-folder-open text-muted mb-3" style="font-size: 3rem;"></i>
                                <h3 class="text-muted">No jobs exist system-wide</h3>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
