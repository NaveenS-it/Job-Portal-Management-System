<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Job Portal</title>
    <link rel="stylesheet" href="/css/style.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        function toggleCompanyField() {
            var isEmployer = document.getElementById('roleEmployer').checked;
            document.getElementById('companyFieldGroup').style.display = isEmployer ? 'block' : 'none';
        }
    </script>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>
    
    <div class="auth-wrapper">
        <div class="auth-card">
        <div class="text-center mb-4">
            <a href="/" style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><i class="fas fa-briefcase"></i> JobBoard.</a>
        </div>
        
        <h2 class="auth-title">Create an Account</h2>
        <p class="auth-subtitle">Join us to find your dream job or recruit top talent.</p>
        
        <div th:if="${emailError}" class="alert alert-error" th:text="${emailError}"></div>

        <form th:action="@{/register}" method="post" th:object="${user}">
            
            <div class="form-group mb-4" style="background: var(--bg-main); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border);">
                <label style="margin-bottom: 12px;">I want to use JobBoard as:</label>
                <div class="flex gap-4">
                    <label style="font-weight: 500; cursor: pointer;" class="flex items-center gap-2">
                        <input type="radio" name="role" id="roleStudent" value="ROLE_JOB_SEEKER" checked onchange="toggleCompanyField()"> 
                        <span><i class="fas fa-user-graduate text-primary"></i> Job Seeker</span>
                    </label>
                    <label style="font-weight: 500; cursor: pointer;" class="flex items-center gap-2">
                        <input type="radio" name="role" id="roleEmployer" value="ROLE_COMPANY" onchange="toggleCompanyField()"> 
                        <span><i class="fas fa-building text-secondary"></i> Employer</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="name">Your Full Name</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="John Doe" required>
                <span class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </div>

            <div id="companyFieldGroup" style="display: none;">
                <div class="form-group">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" th:field="*{companyName}" class="form-control" placeholder="e.g. Acme Corp">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="gstNumber">GST / Business ID</label>
                        <input type="text" id="gstNumber" th:field="*{gstNumber}" class="form-control" placeholder="22AAAAA0000A1Z5">
                    </div>
                    <div class="form-group">
                        <label for="website">Website URL</label>
                        <input type="url" id="website" th:field="*{website}" class="form-control" placeholder="https://acme.com">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="industry">Industry</label>
                        <select id="industry" th:field="*{industry}" class="form-control">
                            <option value="IT">IT & Software</option>
                            <option value="Finance">Finance</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Engineering">Engineering</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="companySize">Company Size</label>
                        <select id="companySize" th:field="*{companySize}" class="form-control">
                            <option value="1-10">1-10 Employees</option>
                            <option value="11-50">11-50 Employees</option>
                            <option value="51-200">51-200 Employees</option>
                            <option value="201-500">201-500 Employees</option>
                            <option value="500+">500+ Employees</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="address">Headquarters Address</label>
                    <input type="text" id="address" th:field="*{address}" class="form-control" placeholder="Full address">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="john@example.com" required>
                <span class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Create a strong password" required>
                <span class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>
            
            <button type="submit" id="submitBtn" class="btn btn-primary mt-3" style="width: 100%; padding: 14px; font-size: 1.05rem;">
                <span id="btnText">Complete Registration <i class="fas fa-arrow-right"></i></span>
            </button>
        </form>
        <script>
            document.querySelector('form').addEventListener('submit', function() {
                var btn = document.getElementById('submitBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending OTP...';
                btn.style.opacity = '0.7';
                btn.style.pointerEvents = 'none';
            });
        </script>
        
        <div class="mt-4 text-center">
            <p class="text-muted text-sm">Already have an account? <a href="/login" style="font-weight: 600;">Sign in here</a></p>
        </div>
    </div>
</div>
</body>
</html>
