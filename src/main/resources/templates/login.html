<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-wrapper" style="margin: 0; padding: 0;">

    <div class="auth-card">
        <div class="text-center mb-4">
            <a href="/" style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><i class="fas fa-briefcase"></i> JobBoard.</a>
        </div>
        
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Enter your credentials to access your account.</p>
        
        <div th:if="${param.error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> Invalid email address or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> You have successfully logged out.
        </div>
        <div th:if="${param.success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> Account created! Please log in below.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Email Address</label>
                <div style="position: relative;">
                    <i class="far fa-envelope text-muted" style="position: absolute; left: 16px; top: 16px;"></i>
                    <input type="email" id="username" name="username" class="form-control" placeholder="john@example.com" style="padding-left: 45px;" required autofocus>
                </div>
            </div>
            
            <div class="form-group mb-1">
                <div class="flex justify-between items-center mb-1">
                    <label for="password" style="margin: 0;">Password</label>
                </div>
                <div style="position: relative;">
                    <i class="fas fa-lock text-muted" style="position: absolute; left: 16px; top: 16px;"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" style="padding-left: 45px;" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary mt-4" style="width: 100%; padding: 14px; font-size: 1.05rem;">Sign In <i class="fas fa-sign-in-alt mt-1"></i></button>
            <div class="text-center mt-3 mb-1 text-sm text-muted">Or sign in dynamically as Admin with admin@jobportal.com / admin123</div>
        </form>
        
        <div class="mt-4 text-center" style="border-top: 1px solid var(--border); padding-top: 24px;">
            <p class="text-muted text-sm">Don't have an account yet? <a href="/register" style="font-weight: 600;">Create an account</a></p>
        </div>
    </div>
</body>
</html>
