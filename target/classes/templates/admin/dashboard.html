<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="container mt-5 mb-5">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h2 class="mb-1">Central Console</h2>
                <div class="text-muted"><i class="fas fa-shield-alt text-primary"></i> Superadmin privileges granted</div>
            </div>
            
            <div class="flex gap-2">
                <a href="/admin/users" class="btn btn-outline"><i class="fas fa-users-cog"></i> Manage Entities</a>
                <a href="/admin/jobs" class="btn btn-primary"><i class="fas fa-briefcase"></i> Monitor Jobs</a>
            </div>
        </div>

        <div class="grid-4 mb-5">
            <div class="stat-card" style="border-left-color: var(--primary);">
                <h3>Total Students</h3>
                <div class="value" th:text="${totalStudents}">0</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--secondary);">
                <h3>Total Employers</h3>
                <div class="value" th:text="${totalEmployers}">0</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--accent);">
                <h3>Live Jobs</h3>
                <div class="value" th:text="${totalJobs}">0</div>
            </div>
            <div class="stat-card" style="border-left-color: #8B5CF6;">
                <h3>Total Submissions</h3>
                <div class="value" th:text="${totalApplications}">0</div>
            </div>
        </div>
        
        <div class="card" style="text-align: center; padding: 40px; background: url('https://www.transparenttextures.com/patterns/cubes.png'), linear-gradient(135deg, rgba(79, 70, 229, 0.05), rgba(139, 92, 246, 0.05)); border: 1px dashed var(--border);">
            <i class="fas fa-satellite-dish text-primary" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.8;"></i>
            <h3>System Operating Normally</h3>
            <p class="text-muted mt-2" style="max-width: 600px; margin: 0 auto;">No pending severe warnings or database failures. All interconnected systems are stable.</p>
        </div>
    </div>
</body>
</html>
