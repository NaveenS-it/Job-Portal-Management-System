<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Job Portal</title>
    <link rel="stylesheet" href="/css/style.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-wrapper" style="margin: 0; padding: 0;">

    <div class="auth-card">
        <div class="text-center mb-4">
            <a href="/" style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><i class="fas fa-briefcase"></i> JobBoard.</a>
        </div>
        
        <h2 class="auth-title">Forgot Password</h2>
        <p class="auth-subtitle">Enter your email and we'll send you an OTP to reset your password.</p>
        
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/forgot-password}" method="post" id="forgotPwdForm">
            <div class="form-group mb-4">
                <label for="email">Email Address</label>
                <div style="position: relative;">
                    <i class="far fa-envelope text-muted" style="position: absolute; left: 16px; top: 16px;"></i>
                    <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" style="padding-left: 45px;" required autofocus>
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="btn btn-primary mt-2" style="width: 100%; padding: 14px; font-size: 1.05rem;">
                <span id="btnText">Send OTP <i class="fas fa-paper-plane mt-1"></i></span>
            </button>
        </form>
        
        <div class="mt-4 text-center" style="border-top: 1px solid var(--border); padding-top: 24px;">
            <p class="text-muted text-sm">Remember your password? <a href="/login" style="font-weight: 600;">Sign in here</a></p>
        </div>
    </div>
    
    <script>
        document.getElementById('forgotPwdForm').addEventListener('submit', function() {
            var btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';
        });
    </script>
</body>
</html>
