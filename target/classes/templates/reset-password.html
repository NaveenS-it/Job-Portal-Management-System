<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Job Portal</title>
    <link rel="stylesheet" href="/css/style.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-wrapper" style="margin: 0; padding: 0;">

    <div class="auth-card">
        <div class="text-center mb-4">
            <a href="/" style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><i class="fas fa-briefcase"></i> JobBoard.</a>
        </div>
        
        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-subtitle">Create a new strong password for your account.</p>
        
        <div id="errorAlert" class="alert alert-error" style="display: none;">
            <i class="fas fa-exclamation-circle"></i> Passwords do not match!
        </div>

        <form th:action="@{/reset-password}" method="post" id="resetPwdForm">
            <div class="form-group mb-3">
                <label for="password">New Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock text-muted" style="position: absolute; left: 16px; top: 16px;"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" style="padding-left: 45px;" required minlength="6" autofocus>
                </div>
            </div>
            
            <div class="form-group mb-4">
                <label for="confirmPassword">Confirm Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock text-muted" style="position: absolute; left: 16px; top: 16px;"></i>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" style="padding-left: 45px;" required minlength="6">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary mt-2" style="width: 100%; padding: 14px; font-size: 1.05rem;">Reset Password <i class="fas fa-save mt-1"></i></button>
        </form>
    </div>
    
    <script>
        document.getElementById('resetPwdForm').addEventListener('submit', function(e) {
            var pwd = document.getElementById('password').value;
            var confirm = document.getElementById('confirmPassword').value;
            var errorAlert = document.getElementById('errorAlert');
            
            if (pwd !== confirm) {
                e.preventDefault();
                errorAlert.style.display = 'block';
                document.getElementById('confirmPassword').style.borderColor = 'red';
            } else {
                errorAlert.style.display = 'none';
                document.getElementById('confirmPassword').style.borderColor = 'var(--border)';
            }
        });
    </script>
</body>
</html>
