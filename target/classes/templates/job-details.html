<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${job.title + ' - Job Portal'}">Job Details</title>
    <link rel="stylesheet" href="/css/style.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .detail-card {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            margin-top: 40px;
            box-shadow: var(--shadow-main);
        }
        .info-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-radius: var(--radius-pill);
            font-size: 0.9rem;
            font-weight: 600;
        }
        .company-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .company-logo {
            width: 64px;
            height: 64px;
            background: var(--primary);
            color: white;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="container py-5">
        <div class="detail-card" th:if="${job != null}">
            <div class="company-header">
                <div class="company-logo" th:text="${job.postedBy.companyName.substring(0,1)}">T</div>
                <div>
                    <h1 th:text="${job.title}" style="margin-bottom: 5px;">Job Title</h1>
                    <p class="text-muted"><i class="fas fa-building"></i> <span th:text="${job.postedBy.companyName}">Company</span></p>
                </div>
            </div>

            <div class="flex gap-3 flex-wrap mb-4">
                <div class="info-pill"><i class="fas fa-map-marker-alt"></i> <span th:text="${job.location}">Location</span></div>
                <div class="info-pill"><i class="fas fa-briefcase"></i> <span th:text="${job.jobType}">Type</span></div>
                <div class="info-pill"><i class="fas fa-wallet"></i> <span th:text="${job.salary}">Salary</span></div>
                <div class="info-pill"><i class="fas fa-laptop-house"></i> <span th:text="${job.workMode}">Work Mode</span></div>
            </div>

            <div class="mt-5">
                <h3>Job Description</h3>
                <div class="mt-3 text-muted" style="line-height: 1.8; white-space: pre-line;" th:text="${job.description}">
                    Description goes here...
                </div>
            </div>

            <div class="mt-5">
                <h3>Requirements & Skills</h3>
                <div class="mt-3">
                    <span th:each="skill : ${job.skillsRequired.split(',')}" class="badge badge-applied mr-2 mb-2" th:text="${skill.trim()}">Skill</span>
                </div>
                <p class="mt-3 text-muted"><strong>Experience:</strong> <span th:text="${job.experience}">3+ years</span></p>
            </div>

            <div class="mt-5 pt-4 border-top">
                <div sec:authorize="hasAuthority('ROLE_JOB_SEEKER')">
                    <a th:href="@{'/student/apply/' + ${job.id}}" class="btn btn-primary btn-lg" style="padding: 15px 40px;">Apply Now <i class="fas fa-paper-plane ml-2"></i></a>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-primary btn-lg" style="padding: 15px 40px;">Login to Apply <i class="fas fa-sign-in-alt ml-2"></i></a>
                </div>
                <div sec:authorize="hasAnyAuthority('ROLE_COMPANY', 'ROLE_ADMIN')">
                    <p class="text-muted"><em>Admins and Employers cannot apply for jobs.</em></p>
                </div>
            </div>
        </div>

        <div th:if="${job == null}" class="text-center py-5">
            <h2 class="text-muted">Job not found or has been removed.</h2>
            <a href="/jobs" class="btn btn-outline mt-3">Back to Browse</a>
        </div>
    </div>

    <script th:replace="~{fragments/header :: theme-script}"></script>
</body>
</html>
