<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Jobs - Job Portal</title>
    <link rel="stylesheet" href="/css/style.css?v=2.0">
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="container mt-4 mb-5">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        
        <div class="flex justify-between items-center mb-4">
            <h2>Search Form Jobs</h2>
            <form action="/student/jobs" method="get" class="flex gap-2">
                <input type="text" name="keyword" class="form-control" placeholder="Search title, skills..." th:value="${keyword}">
                <button type="submit" class="btn btn-outline">Search</button>
            </form>
        </div>

        <div class="job-grid">
            <div th:each="job : ${jobs}" class="job-card">
                <div class="job-card-header">
                    <div>
                        <h3 class="job-card-title" th:text="${job.title}">Job Title</h3>
                        <div class="job-card-company">
                            <i class="far fa-building"></i> 
                            <span th:text="${job.postedBy.companyName != null ? job.postedBy.companyName : job.postedBy.name}">Company</span>
                            • <i class="fas fa-map-marker-alt"></i> <span th:text="${job.location}">Location</span>
                        </div>
                    </div>
                </div>
                
                <div class="job-tags">
                    <span class="badge badge-outline" th:text="${job.jobType != null ? job.jobType : 'Full-Time'}">Full-Time</span>
                    <span class="badge badge-outline" th:text="${job.workMode != null ? job.workMode : 'Remote'}">Remote</span>
                    <span class="badge badge-shortlisted" th:text="${job.salary}">$100k</span>
                </div>
                
                <p class="job-card-desc" th:text="${#strings.abbreviate(job.description, 120)}">Job Description</p>
                
                <div class="job-card-footer">
                    <div class="text-muted">
                        <i class="far fa-clock"></i> <span th:text="${#temporals.format(job.postedDate, 'MMM dd, yyyy')}">Date</span>
                    </div>
                    <form th:action="@{'/student/apply/' + ${job.id}}" method="post">
                        <button type="submit" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.9rem;">
                           Apply Now <i class="fas fa-paper-plane" style="margin-left: 5px;"></i>
                        </button>
                    </form>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(jobs)}" class="card" style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                <i class="far fa-frown text-muted" style="font-size: 3rem; margin-bottom: 20px;"></i>
                <h3>No jobs found matching your criteria.</h3>
                <p class="text-muted mt-2">Try adjusting your filters or browse all categories.</p>
            </div>
        </div>
    </div>
</body>
</html>
