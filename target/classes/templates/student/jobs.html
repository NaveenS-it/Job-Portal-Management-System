<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Jobs - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="container mt-4 mb-5">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        
        <div class="flex justify-between items-center mb-4">
            <h2>Search Form Jobs</h2>
            <form action="/student/jobs" method="get" class="flex gap-2">
                <input type="text" name="keyword" class="form-control" placeholder="Search title, skills..." th:value="${keyword}">
                <button type="submit" class="btn btn-outline">Search</button>
            </form>
        </div>

        <div class="job-grid">
            <div th:each="job : ${jobs}" class="card">
                <h3 th:text="${job.title}">Job Title</h3>
                <p class="text-muted mt-1" th:text="${job.postedBy.name} + ' • ' + ${job.location}">Company</p>
                
                <div class="mt-3">
                    <span class="badge badge-applied" th:text="${job.experience}">Exp</span>
                    <span class="badge badge-shortlisted" th:text="${job.salary}">Salary</span>
                </div>
                
                <p class="mt-3" th:text="${#strings.abbreviate(job.description, 100)}">Description</p>
                
                <form th:action="@{'/student/apply/' + ${job.id}}" method="post" class="mt-4">
                    <button type="submit" class="btn btn-primary" style="width: 100%">Quick Apply</button>
                </form>
            </div>
            
            <div th:if="${#lists.isEmpty(jobs)}" class="card">
                <p>No jobs found.</p>
            </div>
        </div>
    </div>
</body>
</html>
